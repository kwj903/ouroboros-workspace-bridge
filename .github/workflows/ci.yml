name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    env:
      WORKSPACE_ROOT: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - name: Install dependencies
        run: uv sync

      - name: Check Bash syntax
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done
          bash -n install.sh

      - name: Check PowerShell syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = @("install.ps1", "scripts/dev_session.ps1")
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests

      - name: Run smoke check
        run: uv run python scripts/smoke_check.py

      - name: Check update info
        run: uv run python scripts/update_version_info.py --check

      - name: Check diff whitespace
        run: git diff --check
