name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    env:
      WORKSPACE_ROOT: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Check shell syntax
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done
          bash -n install.sh

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests

      - name: Run smoke check
        run: uv run python scripts/smoke_check.py

      - name: Check update info
        run: uv run python scripts/update_version_info.py --check

      - name: Check diff whitespace
        run: git diff --check
